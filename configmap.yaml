apiVersion: v1
kind: ConfigMap
metadata:
  name: web-content
  namespace: default
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <title>Multi-Region HA — Kubernetes</title>
      <style>
        body{font-family:monospace;background:#0d1117;color:#e6edf3;
             display:flex;align-items:center;justify-content:center;
             min-height:100vh;margin:0}
        .card{background:#161b22;border:1px solid #30363d;border-radius:8px;
              padding:32px 40px;text-align:center;max-width:460px}
        .badge{background:#7c3aed;color:#fff;padding:3px 12px;border-radius:4px;
               font-size:11px;font-weight:700;letter-spacing:1px;
               display:inline-block;margin-bottom:16px}
        .region{font-size:20px;font-weight:700;color:#3fb950;margin-bottom:12px}
        .meta{color:#8b949e;font-size:13px;line-height:1.9}
        .hl{color:#79c0ff}
      </style>
    </head>
    <body>
      <div class="card">
        <div class="badge">KUBERNETES · DAY 32</div>
        <div class="region">⎈ Running on Kubernetes</div>
        <div class="meta">
          <div>Pod: <span class="hl">web</span></div>
          <div>Node: <span class="hl">node01</span></div>
          <div>Status: <span class="hl">Healthy</span></div>
        </div>
      </div>
    </body>
    </html>
